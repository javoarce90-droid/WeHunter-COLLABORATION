name: CI

# Corre en cada PR hacia dev y main. Si algo falla, el merge queda bloqueado
# (configurar branch protection para que sea obligatorio — ver docs/MERGE_GATE.md).

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test
